name: Linting

on:
  push:
    branches: [main]

jobs:
  golangci:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: set up go-lang
        uses: actions/setup-go@5
        with:
          go-version: 1.22

      - name: run go-lang lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
